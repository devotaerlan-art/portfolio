<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Soal Latihan Bahasa Indonesia Kelas X</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --primary: #2563eb;
    --primary-light: #dbeafe;
    --success: #16a34a;
    --success-light: #dcfce7;
    --danger: #dc2626;
    --danger-light: #fee2e2;
    --bg: #f0f4ff;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(37,99,235,0.07);
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  .header {
    background: var(--primary);
    color: #fff;
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(37,99,235,0.18);
  }
  .header h1 { font-size: 1.05rem; font-weight: 700; letter-spacing: 0.01em; }
  .header p { font-size: 0.78rem; opacity: 0.85; margin-top: 2px; }

  /* Progress bar */
  .progress-wrap {
    background: rgba(255,255,255,0.25);
    border-radius: 99px;
    height: 6px;
    margin-top: 12px;
    overflow: hidden;
  }
  .progress-bar {
    background: #fff;
    height: 100%;
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label { font-size: 0.72rem; opacity: 0.9; margin-top: 5px; }

  /* Score summary at top */
  .score-summary {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 10px;
    font-size: 0.75rem;
  }
  .score-summary span { background: rgba(255,255,255,0.18); border-radius: 99px; padding: 2px 12px; }
  .score-summary .s-correct { background: rgba(22,163,74,0.35); }
  .score-summary .s-wrong { background: rgba(220,38,38,0.3); }

  /* Main content */
  .main { padding: 16px 12px 80px; max-width: 700px; margin: 0 auto; }

  /* Section divider */
  .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 22px 0 8px;
    padding-left: 2px;
  }

  /* Reading passage */
  .passage {
    background: #f8faff;
    border-left: 3px solid var(--primary);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
    font-size: 0.82rem;
    line-height: 1.7;
    color: #334155;
  }
  .passage-title { font-weight: 600; margin-bottom: 6px; font-size: 0.83rem; color: var(--primary); }
  .dialogue { font-style: italic; }
  .dialogue p { margin-bottom: 2px; }

  /* Question card */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 16px;
    margin-bottom: 14px;
    border: 1.5px solid var(--border);
    transition: border-color 0.2s;
  }
  .card.answered-correct { border-color: var(--success); }
  .card.answered-wrong { border-color: var(--danger); }

  .q-num { font-size: 0.68rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .q-text { font-size: 0.88rem; font-weight: 500; line-height: 1.6; margin-bottom: 14px; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: #f8fafc;
    cursor: pointer;
    transition: all 0.15s ease;
    font-size: 0.84rem;
    line-height: 1.5;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  .option:hover:not(.disabled) { border-color: var(--primary); background: var(--primary-light); }
  .option.disabled { cursor: default; }
  .option-letter {
    min-width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--border);
    color: var(--muted);
    font-size: 0.72rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
    transition: all 0.15s;
  }
  .option-text { flex: 1; }

  /* States */
  .option.correct { border-color: var(--success); background: var(--success-light); }
  .option.correct .option-letter { background: var(--success); color: #fff; }
  .option.wrong { border-color: var(--danger); background: var(--danger-light); }
  .option.wrong .option-letter { background: var(--danger); color: #fff; }

  /* Feedback */
  .feedback {
    margin-top: 12px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.8rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: var(--success-light); color: #166534; border-left: 3px solid var(--success); }
  .feedback.wrong-fb { background: var(--danger-light); color: #991b1b; border-left: 3px solid var(--danger); }
  .feedback-header { font-weight: 600; margin-bottom: 4px; font-size: 0.83rem; }

  /* Final result */
  .result-card {
    background: var(--primary);
    color: #fff;
    border-radius: var(--radius);
    padding: 24px 20px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(37,99,235,0.2);
  }
  .result-card .big-score { font-size: 3.5rem; font-weight: 700; line-height: 1; }
  .result-card .score-label { font-size: 0.85rem; opacity: 0.85; margin-top: 4px; }
  .result-card .score-detail { font-size: 0.8rem; opacity: 0.75; margin-top: 8px; }
  .result-card .emoji { font-size: 2rem; margin-bottom: 8px; }

  /* Sticky bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    gap: 10px;
    justify-content: center;
    z-index: 100;
    box-shadow: 0 -2px 12px rgba(0,0,0,0.06);
  }
  .btn {
    flex: 1;
    max-width: 260px;
    padding: 12px 20px;
    border-radius: 10px;
    font-family: 'Poppins', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #cbd5e1; }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* Scroll to top */
  .scroll-top {
    position: fixed;
    bottom: 74px; right: 16px;
    width: 40px; height: 40px;
    background: var(--primary);
    color: #fff;
    border-radius: 50%;
    border: none;
    font-size: 1.1rem;
    cursor: pointer;
    box-shadow: 0 2px 10px rgba(37,99,235,0.3);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 99;
    -webkit-tap-highlight-color: transparent;
  }
  .scroll-top.show { display: flex; }
</style>
</head>
<body>

<div class="header">
  <h1>📚 Latihan Bahasa Indonesia Kelas X</h1>
  <p>Asesmen Sumatif Akhir Semester</p>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 dari 50 soal dijawab</div>
  <div class="score-summary">
    <span class="s-correct" id="correctCount">✓ 0 Benar</span>
    <span class="s-wrong" id="wrongCount">✗ 0 Salah</span>
  </div>
</div>

<div class="main" id="main"></div>

<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="scrollToUnanswered()">Soal Belum Dijawab</button>
  <button class="btn btn-primary" onclick="showFinalResult()" id="finalBtn">Lihat Nilai Akhir</button>
</div>

<button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
const questions = [
  // ============ NEGOSIASI (1-14) ============
  {
    passage: `<div class="passage"><div class="passage-title">Teks Negosiasi 1 (untuk soal nomor 1–3)</div><div class="dialogue"><p>Pembeli : "Selamat pagi, Kak."</p><p>Penjual : "Selamat pagi. Silakan, ada yang bisa dibantu?"</p><p>Pembeli : "Saya mau cari sepatu sekolah warna hitam. Yang ini berapa harganya?"</p><p>Penjual : "Yang itu Rp180.000,00, Kak."</p><p>Pembeli : "Wah, agak mahal. Boleh kurang tidak, Kak? Rp140.000,00 saja?"</p><p>Penjual : "Maaf, Kak. Belum bisa segitu. Bagaimana kalau Rp165.000,00? Sudah harga pas ini."</p><p>Pembeli : "Rp155.000,00 ya, Kak. Saya beli dua pasang sekalian."</p><p>Penjual : "Baiklah, kalau dua pasang, saya setujui Rp155.000,00 per pasang."</p></div></div>`,

  {

  {

    passage: `<div class="passage"><div class="passage-title">Teks Biografi: R.A. Kartini (untuk soal nomor 15–17)</div><p>Raden Adjeng Kartini lahir di Jepara, Jawa Tengah, pada 21 April 1879. Ia merupakan putri dari Bupati Jepara, Raden Mas Adipati Ario Sosroningrat. Sebagai putri bangsawan, Kartini mendapatkan kesempatan mengenyam pendidikan di Europeesche Lagere School (ELS). Namun, tradisi pingitan pada masa itu memaksanya berhenti sekolah setelah lulus dari ELS.</p><p>Meski terbelenggu adat, semangat Kartini untuk memajukan kaum perempuan tidak padam. Ia rajin membaca buku, majalah, dan koran berbahasa Belanda untuk memperluas wawasannya. Ia juga aktif berkorespondensi dengan para sahabat penanya di Belanda. Melalui surat-suratnya, Kartini mengungkapkan harapannya agar perempuan Indonesia dapat memperoleh pendidikan yang setara.</p></div>`,

    explanation: "Bunga yang 'mekar sendiri tanpa yang memandang' dijadikan simbol kebaikan yang 'tumbuh diam di sudut dunia'. Tema puisi ini adalah kebaikan yang dilakukan dengan tulus tanpa mengharap pengakuan dari siapapun."
  }
];

let answered = new Array(questions.length).fill(null);
let correct = 0, wrong = 0;

function updateProgress() {
  const total = answered.filter(a => a !== null).length;
  correct = answered.filter((a,i) => a !== null && a === questions[i].answer).length;
  wrong = total - correct;
  const pct = Math.round((total / questions.length) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${total} dari ${questions.length} soal dijawab`;
  document.getElementById('correctCount').textContent = `✓ ${correct} Benar`;
  document.getElementById('wrongCount').textContent = `✗ ${wrong} Salah`;
}

function selectAnswer(qIdx, optIdx) {
  if (answered[qIdx] !== null) return;
  answered[qIdx] = optIdx;

  const card = document.getElementById(`card-${qIdx}`);
  const opts = card.querySelectorAll('.option');
  const correctIdx = questions[qIdx].answer;
  const fb = document.getElementById(`fb-${qIdx}`);

  opts.forEach(o => o.classList.add('disabled'));

  if (optIdx === correctIdx) {
    opts[optIdx].classList.add('correct');
    card.classList.add('answered-correct');
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `<div class="feedback-header">✅ Benar!</div>${questions[qIdx].explanation}`;
  } else {
    opts[optIdx].classList.add('wrong');
    opts[correctIdx].classList.add('correct');
    card.classList.add('answered-wrong');
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `<div class="feedback-header">❌ Kurang tepat</div>Jawaban yang benar adalah <strong>${String.fromCharCode(65+correctIdx)}</strong>. ${questions[qIdx].explanation}`;
  }

  updateProgress();
}

function scrollToUnanswered() {
  for (let i = 0; i < questions.length; i++) {
    if (answered[i] === null) {
      document.getElementById(`card-${i}`).scrollIntoView({behavior:'smooth', block:'center'});
      return;
    }
  }
  alert('Semua soal sudah dijawab! 🎉');
}

function showFinalResult() {
  const total = answered.filter(a => a !== null).length;
  if (total < questions.length) {
    const unanswered = questions.length - total;
    if (!confirm(`Masih ada ${unanswered} soal yang belum dijawab. Tetap lihat nilai akhir?`)) return;
  }
  const score = Math.round((correct / questions.length) * 100);
  let emoji = score >= 80 ? '🏆' : score >= 60 ? '👍' : '💪';
  let msg = score >= 80 ? 'Luar biasa!' : score >= 60 ? 'Bagus, terus semangat!' : 'Tetap semangat belajar!';
  const resultDiv = document.createElement('div');
  resultDiv.className = 'result-card';
  resultDiv.innerHTML = `
    <div class="emoji">${emoji}</div>
    <div class="big-score">${score}</div>
    <div class="score-label">Nilai Akhir (dari 100)</div>
    <div class="score-detail">${msg} | ${correct} benar · ${wrong} salah · ${questions.length - total} belum dijawab</div>
  `;
  document.getElementById('main').insertBefore(resultDiv, document.getElementById('main').firstChild);
  window.scrollTo({top:0,behavior:'smooth'});
}

// Build UI
function buildQuiz() {
  const main = document.getElementById('main');
  const sections = [
    { label: 'Bagian 1: Teks Negosiasi', start: 0, end: 13 },
    { label: 'Bagian 2: Teks Biografi', start: 14, end: 29 },
    { label: 'Bagian 3: Puisi', start: 30, end: 49 }
  ];

  let sIdx = 0;
  let lastPassage = '';

  for (let i = 0; i < questions.length; i++) {
    // Section label
    if (sIdx < sections.length && i === sections[sIdx].start) {
      const sec = document.createElement('div');
      sec.className = 'section-label';
      sec.textContent = sections[sIdx].label;
      main.appendChild(sec);
      sIdx++;
    }

    const q = questions[i];

    // Passage (only render if new)
    if (q.passage && q.passage !== lastPassage) {
      const p = document.createElement('div');
      p.innerHTML = q.passage;
      main.appendChild(p);
      lastPassage = q.passage;
    }

    // Card
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${i}`;

    const letters = ['A','B','C','D','E'];
    let optHtml = q.options.map((opt, j) =>
      `<div class="option" onclick="selectAnswer(${i},${j})" id="opt-${i}-${j}">
        <span class="option-letter">${letters[j]}</span>
        <span class="option-text">${opt}</span>
      </div>`
    ).join('');

    card.innerHTML = `
      <div class="q-num">Soal ${q.num}</div>
      <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>
      <div class="options">${optHtml}</div>
      <div class="feedback" id="fb-${i}"></div>
    `;
    main.appendChild(card);
  }
}

buildQuiz();
updateProgress();

// Scroll to top button
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scrollTopBtn');
  if (window.scrollY > 300) btn.classList.add('show');
  else btn.classList.remove('show');
});
</script>
